<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahadi Shakti Group — Invoice System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-shell">

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <div class="logo-mark">M</div>
      <div class="logo-name">Mahadi Shakti<br>Group</div>
      <div class="logo-tagline">Invoice System</div>
    </div>

    <nav>

      <div class="nav-section">
        <div class="nav-section-label">Main Menu</div>

        <div class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </div>

        <div class="nav-item" data-page="invoices" onclick="App.navigate('invoices')">
          <span class="nav-icon">📄</span>
          <span class="nav-label">Invoices</span>
          <span class="nav-badge">6</span>
        </div>

        <div class="nav-item" data-page="clients" onclick="App.navigate('clients')">
          <span class="nav-icon">👥</span>
          <span class="nav-label">Clients</span>
        </div>

        <div class="nav-item" data-page="create" onclick="App.navigate('create')">
          <span class="nav-icon">➕</span>
          <span class="nav-label">Create Invoice</span>
        </div>

      </div>

      <div class="nav-section">
        <div class="nav-section-label">Analytics</div>

        <div class="nav-item" data-page="reports" onclick="App.navigate('reports')">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Reports</span>
        </div>

      </div>

      <div class="nav-section">
        <div class="nav-section-label">System</div>

        <div class="nav-item" data-page="settings" onclick="App.navigate('settings')">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </div>

      </div>

    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <div class="user-name">Admin</div>
          <div class="user-role">Mahadi Shakti Group</div>
        </div>
        <span style="font-size:16px;color:var(--text-muted);">⋯</span>
      </div>
    </div>

  </aside>

  <!-- ─── MAIN AREA ─── -->
  <main class="main-area">

    <!-- Topbar -->
    <header class="topbar">
      <div>
        <div class="page-title" id="topbar-title">Dashboard</div>
        <div class="page-subtitle" id="topbar-sub">Mahadi Shakti Group — Overview</div>
      </div>

      <div class="topbar-right">

        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search..." />
        </div>

        <button class="btn-icon notif-btn" title="Notifications">
          🔔
          <span class="notif-dot"></span>
        </button>

        <button class="btn btn-gold" onclick="App.navigate('create')">
          ➕ New Invoice
        </button>

      </div>
    </header>

    <!-- Page Content Host -->
    <div id="page-host"></div>

  </main>

</div>

<!-- ─── Scripts ─── -->
<script>
  const Pages = {};
</script>
<script src="src/dashboard.js"></script>
<script src="src/invoices.js"></script>
<script src="src/clients.js"></script>
<script src="src/create-invoice.js"></script>
<script src="src/reports.js"></script>
<script src="src/settings.js"></script>
<script src="src/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => App.init());
</script>

</body>
</html>
